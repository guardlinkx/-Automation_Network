[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
polygon_amoy = "https://rpc-amoy.polygon.technology"
polygon_mainnet = "${POLYGON_MAINNET_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api", chain = 80002 }
